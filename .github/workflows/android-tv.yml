name: Android TV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release or debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.5'
          cache-disabled: true  # avoid failures when GitHub cache service is degraded

      - name: Verify Gradle
        run: gradle -v

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # NOTE: setup-android expects a SPACE-separated string. Newlines get passed as one argument.
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653 cmake;3.22.1"

      - name: Prepare keystore for release
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-tv/keystore.jks
          echo "Keystore written to android-tv/keystore.jks"
          echo "ORG_GRADLE_PROJECT_keystoreFile=keystore.jks" >> $GITHUB_ENV
          echo "ORG_GRADLE_PROJECT_keystorePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ORG_GRADLE_PROJECT_keyAlias=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ORG_GRADLE_PROJECT_keyAliasPassword=${{ secrets.KEY_ALIAS_PASSWORD }}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd android-tv
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "Building RELEASE with signing"
            gradle --no-daemon assembleRelease
          else
            echo "Building DEBUG"
            gradle --no-daemon assembleDebug
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kvideo-tv-${{ env.BUILD_TYPE }}
          path: |
            android-tv/app/build/outputs/apk/debug/*.apk
            android-tv/app/build/outputs/apk/release/*.apk
