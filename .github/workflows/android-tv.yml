name: Android TV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release or debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.5'
          cache-disabled: true  # avoid failures when GitHub cache service is degraded

      - name: Verify Gradle
        run: gradle -v

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # NOTE: setup-android expects a SPACE-separated string. Newlines get passed as one argument.
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653 cmake;3.22.1"

      # NOTE: Release signing via uploaded keystore is currently disabled.
      # The configured KEYSTORE_* secrets are failing integrity checks in CI.
      # We still produce a release build signed with the default debug keystore (installable).
      # Re-enable proper signing once secrets are corrected.

      - name: Build APK
        run: |
          cd android-tv
          echo "Building RELEASE (single universal APK)"
          gradle --no-daemon assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kvideo-tv-${{ env.BUILD_TYPE }}
          path: |
            android-tv/app/build/outputs/apk/debug/*.apk
            android-tv/app/build/outputs/apk/release/*.apk
