name: Android TV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release or debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: '34'
          build-tools: '34.0.0'
          platform: 'android-34'
          ndk: '25.2.9519653'
          cmake: '3.22.1'

      - name: Prepare keystore for release
        if: ${{ inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-tv/keystore.jks
          echo "Keystore written to android-tv/keystore.jks"
          echo "ORG_GRADLE_PROJECT_KEYSTORE_FILE=android-tv/keystore.jks" >> $GITHUB_ENV
          echo "ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ORG_GRADLE_PROJECT_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ORG_GRADLE_PROJECT_KEY_ALIAS_PASSWORD=${{ secrets.KEY_ALIAS_PASSWORD }}" >> $GITHUB_ENV
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build APK
        run: |
          cd android-tv
          if [ "${{ inputs.build_type }}" = "release" ]; then
            echo "Building RELEASE with signing"
            gradle --no-daemon assembleRelease
          else
            echo "Building DEBUG"
            gradle --no-daemon assembleDebug
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kvideo-tv-${{ inputs.build_type }}
          path: |
            android-tv/app/build/outputs/apk/debug/*.apk
            android-tv/app/build/outputs/apk/release/*.apk
